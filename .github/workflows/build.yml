name: Build RemoteCamTweak
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Cache Theos
        uses: actions/cache@v3
        with:
          path: ~/theos
          key: ${{ runner.os }}-theos
      
      - name: Setup Theos
        run: |
          export THEOS=~/theos
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git $THEOS
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV
      
      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make package
      
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCamTweak-deb
          path: packages/*.deb
