name: Build RemoteCamTweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
    - name: Build Tweak
      run: |
        export THEOS=/Users/runner/theos
        make package
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: RemoteCamTweak-deb
        path: packages/*.deb
