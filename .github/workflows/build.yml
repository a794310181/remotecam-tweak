name: Build RemoteCamTweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        
    - name: Setup iOS SDK
      run: |
        curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
        unzip master.zip
        mv sdks-master $HOME/theos/sdks
        rm master.zip
        
    - name: Build
      run: |
        cd RemoteCamTweak
        export ARCHS="arm64 arm64e"
        make clean
        make package FINALPACKAGE=1
        
    - name: Upload Package
      uses: actions/upload-artifact@v3
      with:
        name: RemoteCamTweak
        path: RemoteCamTweak/packages/*.deb
